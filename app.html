<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting - Tyme Boxed</title>
</head>

<body>
  <p id="message">Redirecting...</p>

  <script>
    const PLAY_STORE =
      "https://play.google.com/store/apps/details?id=dev.ambitionsoftware.tyme_boxed";

    const APP_STORE =
      "https://apps.apple.com/in/app/tyme-boxed/id6759287522";

    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    if (/android/i.test(userAgent)) {
      window.location.replace(PLAY_STORE);
    } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
      window.location.replace(APP_STORE);
    } else {
      // Desktop or other devices
      document.getElementById("message").innerHTML = `
        <h2>Download Tyme Boxed</h2>
        <p>Please choose your platform:</p>
        <p><a href="${PLAY_STORE}">📱 Google Play</a></p>
        <p><a href="${APP_STORE}">🍎 App Store</a></p>
      `;
    }
  </script>

  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () {
        (c[a].q = c[a].q || []).push(arguments);
      };
      t = l.createElement(r);
      t.async = 1;
      t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0];
      y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "w3uyp057u9");
  </script>
</body>
</html>
